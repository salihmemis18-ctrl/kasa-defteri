<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Kasa Defteri Pro — v2.5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════ */
:root {
  --d1: #0b0f1a; --d2: #111827; --d3: #1c2333; --d4: #263348;
  --t1: #f1f5f9; --t2: #94a3b8; --t3: #64748b;
  --blue: #3b82f6; --indigo: #6366f1; --green: #10b981; --red: #ef4444;
  --r: 10px; --rx: 18px;
  --grad: linear-gradient(135deg, var(--blue), var(--indigo));
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--d1); color: var(--t1); font-size: 13px; line-height: 1.5; overflow-x: hidden; }

/* KÜÇÜLTÜLMÜŞ TAKVİM */
.cal-wrap { max-width: 320px; margin: 0 auto; }
.cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day { font-size: 10px; text-align: center; color: var(--t3); font-weight: 700; padding-bottom: 5px; }
.cd { height: 34px; display: flex; align-items: center; justify-content: center; background: var(--d2); border-radius: 6px; cursor: pointer; position: relative; font-size: 11px; transition: 0.2s; }
.cd:hover { background: var(--d3); transform: scale(1.05); }
.cd.td { border: 1.5px solid var(--blue); color: var(--blue); font-weight: 700; }
.cd.ho::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--green); border-radius: 50%; }
.cd.om { opacity: 0.2; cursor: default; }

/* PANEL & FORM STİLLERİ */
.glass { background: rgba(17,24,39,0.7); backdrop-filter: blur(10px); border: 1px solid var(--d4); border-radius: var(--rx); padding: 20px; margin-bottom: 15px; }
.btn { border: none; border-radius: 8px; padding: 10px 16px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { background: var(--grad); color: #fff; }
.ff { margin-bottom: 15px; }
.ff label { display: block; font-size: 10px; color: var(--t3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.ff input, .ff select { width: 100%; padding: 12px; background: var(--d3); border: 1px solid var(--d4); border-radius: 10px; color: #fff; outline: none; font-family: inherit; }
.cat-manage { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--d4); }

.screen { display: none; padding: 15px; max-width: 600px; margin: 0 auto; }
.active { display: block !important; }
nav { display: flex; gap: 8px; padding: 15px; background: var(--d2); border-bottom: 1px solid var(--d4); overflow-x: auto; position: sticky; top: 0; z-index: 100; }
nav button { flex-shrink: 0; background: transparent; color: var(--t2); padding: 6px 14px; border-radius: 20px; border: 1px solid transparent; cursor: pointer; font-size: 12px; }
nav button.on { background: var(--blue); color: #fff; font-weight: 600; }
</style>
</head>
<body>

<nav id="mainNav">
  <button onclick="showSec('panel')" id="btn-panel" class="on">🏠 Özet</button>
  <button onclick="showSec('gider')" id="btn-gider">💸 Giderler</button>
  <button onclick="showSec('takvim')" id="btn-takvim">📅 Takvim</button>
</nav>

<div id="sec-panel" class="screen active">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:15px;">
    <div class="glass" style="margin-bottom:0">
      <small style="color:var(--t3); font-size:10px">NAKİT KASA</small>
      <h2 id="mNakit" style="color:var(--green); margin-top:5px">₺0</h2>
    </div>
    <div class="glass" style="margin-bottom:0">
      <small style="color:var(--t3); font-size:10px">BANKA HESABI</small>
      <h2 id="mBanka" style="color:var(--blue); margin-top:5px">₺0</h2>
    </div>
  </div>
</div>

<div id="sec-gider" class="screen">
  <div class="glass">
    <h3 style="margin-bottom:15px; font-size:16px">Gider Kaydı</h3>
    <div class="ff">
      <label>Kategori</label>
      <div style="display:flex; gap:8px;">
        <select id="gidCat"></select>
        <button class="btn" style="background:var(--d4); padding:0 12px" onclick="toggleCatEdit()" title="Kategorileri Düzenle">⚙️</button>
      </div>
    </div>
    
    <div id="catEditBox" class="cat-manage" style="display:none">
      <label style="font-size:9px; font-weight:700; color:var(--indigo)">KATEGORİLERİ DÜZENLE</label>
      <div style="display:flex; gap:8px; margin:10px 0">
        <input type="text" id="newCatName" placeholder="Yeni kategori adı..." style="padding:8px">
        <button class="btn btn-primary" onclick="addCategory()">Ekle</button>
      </div>
      <div id="catList" style="display:flex; flex-wrap:wrap; gap:6px"></div>
    </div>

    <div class="ff"><label>Miktar (₺)</label><input type="number" id="gidAmt" placeholder="0.00"></div>
    <div class="ff">
      <label>Ödeme Kanalı</label>
      <select id="gidSource">
        <option value="nakit">Nakit Kasa</option>
        <option value="banka">Banka Hesabı</option>
      </select>
    </div>
    <button class="btn btn-primary" style="width:100%; padding:14px" onclick="saveGider()">Gideri Onayla ve Düş</button>
  </div>
</div>

<div id="sec-takvim" class="screen">
  <div class="glass cal-wrap">
    <div class="cal-head">
      <button class="btn" onclick="changeMonth(-1)" style="padding:5px 10px">‹</button>
      <h4 id="calTitle" style="font-size:14px">Nisan 2024</h4>
      <button class="btn" onclick="changeMonth(1)" style="padding:5px 10px">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div id="calEvents" style="margin-top:10px"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

// ⚠️ FIREBASE BİLGİLERİNİ BURAYA YAPIŞTIR
const firebaseConfig = {
  apiKey: "BURAYA_GELMELİ",
  authDomain: "BURAYA_GELMELİ",
  projectId: "BURAYA_GELMELİ",
  storageBucket: "BURAYA_GELMELİ",
  messagingSenderId: "BURAYA_GELMELİ",
  appId: "BURAYA_GELMELİ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Global State
let S = { 
  fId: "TEST_FIRMA_ID", // Auth entegrasyonuna kadar sabit kalabilir
  data: null,
  curM: new Date().getMonth(),
  curY: new Date().getFullYear()
};

// Real-time Veri Takibi
function initSync() {
  onSnapshot(doc(db, "firmalar", S.fId), (snap) => {
    if (snap.exists()) {
      S.data = snap.data();
      renderUI();
      renderCalendar();
    }
  });
}

// Arayüzü Güncelle
function renderUI() {
  const b = S.data.bakiyeler || { nakit: 0, banka: 0 };
  document.getElementById('mNakit').innerText = '₺' + b.nakit.toLocaleString('tr-TR');
  document.getElementById('mBanka').innerText = '₺' + b.banka.toLocaleString('tr-TR');
  
  const cats = S.data.kategoriler || ["Genel", "Mutfak", "Kira"];
  document.getElementById('gidCat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
  document.getElementById('catList').innerHTML = cats.map(c => `
    <span style="background:var(--d3); padding:5px 10px; border-radius:6px; font-size:11px; border:1px solid var(--d4); display:flex; align-items:center; gap:8px;">
      ${c} <b style="cursor:pointer; color:var(--red); font-size:14px;" onclick="removeCategory('${c}')">×</b>
    </span>
  `).join('');
}

// Kategori İşlemleri
window.toggleCatEdit = () => {
  const box = document.getElementById('catEditBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
};

window.addCategory = async () => {
  const name = document.getElementById('newCatName').value.trim();
  if (!name) return;
  await updateDoc(doc(db, "firmalar", S.fId), { kategoriler: arrayUnion(name) });
  document.getElementById('newCatName').value = "";
};

window.removeCategory = async (name) => {
  if (confirm(`"${name}" kategorisini silmek istiyor musunuz?`)) {
    await updateDoc(doc(db, "firmalar", S.fId), { kategoriler: arrayRemove(name) });
  }
};

// Gider Kaydetme (Firebase Safe-Increment)
window.saveGider = async () => {
  const amt = parseFloat(document.getElementById('gidAmt').value);
  const cat = document.getElementById('gidCat').value;
  const src = document.getElementById('gidSource').value;
  
  if (!amt || amt <= 0) return alert("Lütfen geçerli bir miktar girin!");

  try {
    const fRef = doc(db, "firmalar", S.fId);
    await updateDoc(fRef, {
      [`bakiyeler.${src}`]: increment(-amt),
      giderler: arrayUnion({
        id: Date.now(),
        miktar: amt,
        kategori: cat,
        kaynak: src,
        tarih: new Date().toISOString()
      })
    });
    document.getElementById('gidAmt').value = "";
    alert("İşlem başarıyla kaydedildi.");
  } catch (err) {
    alert("Hata oluştu: " + err.message);
  }
};

// Takvim Fonksiyonları
window.renderCalendar = () => {
  const grid = document.getElementById('calGrid');
  const days = ['Pz', 'Pt', 'Sa', 'Ça', 'Pe', 'Cu', 'Ct'];
  const firstDay = new Date(S.curY, S.curM, 1).getDay();
  const daysInMonth = new Date(S.curY, S.curM + 1, 0).getDate();
  const months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

  document.getElementById('calTitle').innerText = `${months[S.curM]} ${S.curY}`;
  let html = days.map(d => `<div class="cal-day">${d}</div>`).join('');
  
  for (let i = 0; i < firstDay; i++) html += `<div class="cd om"></div>`;
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dStr = `${S.curY}-${String(S.curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = new Date().toISOString().split('T')[0] === dStr;
    const hasOrg = (S.data?.organizasyonlar || []).some(o => o.tarih === dStr);
    html += `<div class="cd ${isToday?'td':''} ${hasOrg?'ho':''}" onclick="console.log('${dStr}')">${d}</div>`;
  }
  grid.innerHTML = html;
};

window.changeMonth = (v) => {
  S.curM += v;
  if (S.curM > 11) { S.curM = 0; S.curY++; }
  else if (S.curM < 0) { S.curM = 11; S.curY--; }
  renderCalendar();
};

window.showSec = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('on'));
  document.getElementById('sec-' + id).classList.add('active');
  document.getElementById('btn-' + id).classList.add('on');
};

initSync();
</script>
</body>
</html>
